version: "3.9"

x-prod-java: &prod-java
  restart: always
  networks:
    - prod-network
  deploy:
    resources:
      limits:
        memory: 512m
        cpus: "0.5"
      reservations:
        memory: 256m

services:
  rabbitmq-prod:
    image: rabbitmq:3.13-alpine
    container_name: rabbitmq-prod
    restart: always
    networks:
      - prod-network
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - rabbitmq-prod-data:/var/lib/rabbitmq
    deploy:
      resources:
        limits:
          memory: 256m

  user-db-prod:
    image: postgres:16-alpine
    container_name: user-db-prod
    restart: always
    networks:
      - prod-network
    environment:
      POSTGRES_DB: ${USER_DB_NAME}
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER}"]
      interval: 10s
      retries: 5
    volumes:
      - user-db-prod-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256m

  event-db-prod:
    image: postgres:16-alpine
    container_name: event-db-prod
    restart: always
    networks:
      - prod-network
    environment:
      POSTGRES_DB: ${EVENT_DB_NAME}
      POSTGRES_USER: ${EVENT_DB_USER}
      POSTGRES_PASSWORD: ${EVENT_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EVENT_DB_USER}"]
      interval: 10s
      retries: 5
    volumes:
      - event-db-prod-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256m

  registration-db-prod:
    image: postgres:16-alpine
    container_name: registration-db-prod
    restart: always
    networks:
      - prod-network
    environment:
      POSTGRES_DB: ${REGISTRATION_DB_NAME}
      POSTGRES_USER: ${REGISTRATION_DB_USER}
      POSTGRES_PASSWORD: ${REGISTRATION_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${REGISTRATION_DB_USER}"]
      interval: 10s
      retries: 5
    volumes:
      - registration-db-prod-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256m

  notification-db-prod:
    image: postgres:16-alpine
    container_name: notification-db-prod
    restart: always
    networks:
      - prod-network
    environment:
      POSTGRES_DB: ${NOTIFICATION_DB_NAME}
      POSTGRES_USER: ${NOTIFICATION_DB_USER}
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIFICATION_DB_USER}"]
      interval: 10s
      retries: 5
    volumes:
      - notification-db-prod-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256m

  user-service:
    <<: *prod-java
    container_name: user-service-prod
    image: eventmgmt/user-service:latest
    build:
      context: ./user-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      DB_HOST: user-db-prod
      DB_PORT: 5432
      DB_NAME: ${USER_DB_NAME}
      DB_USER: ${USER_DB_USER}
      DB_PASSWORD: ${USER_DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq-prod
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SERVER_PORT: 8081
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    depends_on:
      user-db-prod:
        condition: service_healthy
      rabbitmq-prod:
        condition: service_healthy

  event-service:
    <<: *prod-java
    container_name: event-service-prod
    image: eventmgmt/event-service:latest
    build:
      context: ./event-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: event-db-prod
      DB_PORT: 5432
      DB_NAME: ${EVENT_DB_NAME}
      DB_USER: ${EVENT_DB_USER}
      DB_PASSWORD: ${EVENT_DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq-prod
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SERVER_PORT: 8082
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    depends_on:
      event-db-prod:
        condition: service_healthy
      rabbitmq-prod:
        condition: service_healthy

  registration-service:
    <<: *prod-java
    container_name: registration-service-prod
    image: eventmgmt/registration-service:latest
    build:
      context: ./registration-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: registration-db-prod
      DB_PORT: 5432
      DB_NAME: ${REGISTRATION_DB_NAME}
      DB_USER: ${REGISTRATION_DB_USER}
      DB_PASSWORD: ${REGISTRATION_DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq-prod
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      EVENT_SERVICE_URL: http://event-service:8082
      SERVER_PORT: 8083
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    depends_on:
      registration-db-prod:
        condition: service_healthy
      rabbitmq-prod:
        condition: service_healthy

  notification-service:
    <<: *prod-java
    container_name: notification-service-prod
    image: eventmgmt/notification-service:latest
    build:
      context: ./notification-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: notification-db-prod
      DB_PORT: 5432
      DB_NAME: ${NOTIFICATION_DB_NAME}
      DB_USER: ${NOTIFICATION_DB_USER}
      DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq-prod
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      SERVER_PORT: 8084
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    depends_on:
      notification-db-prod:
        condition: service_healthy
      rabbitmq-prod:
        condition: service_healthy

  nginx:
    container_name: nginx-prod
    restart: always
    networks:
      - prod-network
    build:
      context: ./nginx
      args:
        - NGINX_CONF=nginx.prod.conf
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - user-service
      - event-service
      - registration-service
    deploy:
      resources:
        limits:
          memory: 64m

networks:
  prod-network:
    driver: bridge
    name: prod-network

volumes:
  rabbitmq-prod-data:
  user-db-prod-data:
  event-db-prod-data:
  registration-db-prod-data:
  notification-db-prod-data: