apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: event-management

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
        - name: nginx

          image: eventmgmt/nginx:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 80

          volumeMounts:
            - name: nginx-config-volume
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.prod.conf

      volumes:
        - name: nginx-config-volume
          configMap:
            name: nginx-config