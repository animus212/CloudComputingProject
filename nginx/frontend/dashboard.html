<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Dashboard</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <nav id="nav"></nav>

        <div class="container">
            <h1>My Dashboard</h1>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('registrations', this)">My Bookings</button>
                <button class="tab" onclick="switchTab('notifications', this)">Notifications</button>
                <button class="tab" onclick="switchTab('profile', this)">Profile</button>
            </div>

            <div id="tab-registrations" class="tab-content">
                <div id="reg-error" class="alert alert-error hidden"></div>
                <div id="registrations-list">
                    <div class="loading">Loading registrations...</div>
                </div>
            </div>

            <div id="tab-notifications" class="tab-content hidden">
                <div id="notif-actions" class="hidden" style="display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 15px;">
                    <button class="btn-outline btn-sm" onclick="markAllRead()">Mark All as Read</button>
                    <button class="btn-danger btn-sm" onclick="clearNotifications()">Clear All</button>
                </div>
                <div id="notif-list">
                    <div class="loading">Loading notifications...</div>
                </div>
            </div>

            <div id="tab-profile" class="tab-content hidden">
                <div class="form-card">
                    <h2>Update Profile</h2>
                    <div id="profile-error" class="alert alert-error hidden"></div>
                    <div id="profile-success" class="alert alert-success hidden"></div>

                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="p-firstName">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="p-lastName">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="p-email">
                    </div>
                    <hr>
                    <h3>Change Password</h3>
                    <div class="form-group">
                        <label>Current Password</label>
                        <input type="password" id="p-currentPassword">
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="p-newPassword">
                    </div>
                    <div class="form-actions">
                        <button class="btn-primary" id="updateBtn" data-label="Save Changes" onclick="updateProfile()">
                            Save Changes
                        </button>
                        <button class="btn-danger" onclick="confirmDeleteAccount()">Delete Account</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="app.js"></script>
        <script>
            Auth.requireAuth();
            buildNav('dashboard');

            function switchTab(tab, btn) {
                document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
                document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
                document.getElementById('tab-' + tab).classList.remove('hidden');
                btn.classList.add('active');
            }

            async function loadRegistrations() {
                try {
                    const data = await api('/api/registrations/my');
                    const container = document.getElementById('registrations-list');

                    if (data.length === 0) {
                        container.innerHTML = '<p class="empty-state">No bookings yet. <a href="/">Browse events</a></p>';
                        return;
                    }

                    container.innerHTML = data.map(reg => `
                        <div class="card registration-card ${reg.status === 'CANCELLED' ? 'muted' : ''}">
                            <div class="card-header">
                                <h3>${escapeHTML(reg.eventTitle)}</h3>
                                ${statusBadge(reg.status)}
                            </div>
                            <p>Registered: ${formatDate(reg.registeredAt)}</p>
                            ${reg.status === 'CONFIRMED'
                                ? `<button class="btn-danger btn-sm" onclick="cancelReg(${reg.id}, this)">
                                    Cancel Booking
                                </button>`
                                : ''
                            }
                        </div>
                    `).join('');
                } catch (err) {
                    showError('reg-error', err.message);
                }
            }

            async function cancelReg(id, btn) {
                if (!confirm('Cancel this booking?')) return;
                btn.disabled = true;
                try {
                    await api(`/api/registrations/${id}`, 'DELETE');
                    loadRegistrations();
                } catch (err) {
                    btn.disabled = false;
                    alert('Error: ' + err.message);
                }
            }

            async function loadNotifications() {
                try {
                    const data = await api('/api/notifications/my');
                    const container = document.getElementById('notif-list');

                    if (data.length === 0) {
                        container.innerHTML = '<p class="empty-state">No notifications.</p>';
                        document.getElementById('notif-actions').classList.add('hidden');
                        return;
                    }

                    document.getElementById('notif-actions').classList.remove('hidden');

                    container.innerHTML = data.map(n => `
                        <div class="card notif-card ${n.status === 'FAILED' ? 'failed' : ''}" style="${n.read ? 'opacity: 0.6;' : 'border-left: 4px solid var(--accent);'}">
                            <div class="card-header">
                                <strong>${escapeHTML(n.type.replace('_', ' '))}</strong>
                                ${!n.read ? `<button class="btn-outline btn-sm" onclick="markRead(${n.id})">Mark Read</button>` : '<span>Read</span>'}
                            </div>
                            <p>${escapeHTML(n.message)}</p>
                            <small>${formatDate(n.createdAt)}</small>
                        </div>
                    `).join('');
                } catch (err) {
                    document.getElementById('notif-list').innerHTML =
                        `<p class="empty-state">Could not load notifications.</p>`;
                }
            }

            async function markRead(id) {
                try {
                    await api(`/api/notifications/${id}/read`, 'PUT');
                    loadNotifications();
                } catch (err) {
                    alert('Failed to mark as read: ' + err.message);
                }
            }

            async function markAllRead() {
                try {
                    await api('/api/notifications/read-all', 'PUT');
                    loadNotifications();
                } catch (err) {
                    alert('Failed to update notifications: ' + err.message);
                }
            }

            async function clearNotifications() {
                if(!confirm("Clear all notifications?")) return;
                try {
                    await api('/api/notifications/clear', 'DELETE');
                    loadNotifications();
                } catch (err) {
                    alert('Failed to clear notifications: ' + err.message);
                }
            }

            async function loadProfile() {
                try {
                    const user = await api('/api/users/me');
                    document.getElementById('p-firstName').value = user.firstName || '';
                    document.getElementById('p-lastName').value = user.lastName || '';
                    document.getElementById('p-email').value = user.email || '';
                } catch (err) {
                    showError('profile-error', err.message);
                }
            }

            async function updateProfile() {
                hideError('profile-error');
                setLoading('updateBtn', true);

                const body = {};
                const email = document.getElementById('p-email').value;
                const firstName = document.getElementById('p-firstName').value;
                const lastName = document.getElementById('p-lastName').value;
                const currentPassword = document.getElementById('p-currentPassword').value;
                const newPassword = document.getElementById('p-newPassword').value;

                if (firstName) body.firstName = firstName;
                if (lastName) body.lastName = lastName;
                if (email) body.email = email;
                if (newPassword) {
                    body.currentPassword = currentPassword;
                    body.newPassword = newPassword;
                }

                try {
                    await api('/api/users/me', 'PUT', body);
                    showSuccess('profile-success', 'Profile updated successfully!');
                    const user = Auth.getUser();
                    user.firstName = firstName;
                    user.lastName = lastName;
                    Auth.setUser(user);
                    buildNav('dashboard');
                } catch (err) {
                    showError('profile-error', err.message);
                } finally {
                    setLoading('updateBtn', false);
                }
            }

            async function confirmDeleteAccount() {
                if (!confirm('Are you sure you want to delete your account? This cannot be undone.')) return;
                try {
                    await api('/api/users/me', 'DELETE');
                    Auth.logout();
                } catch (err) {
                    alert('Error: ' + err.message);
                }
            }

            loadRegistrations();
            loadNotifications();
            loadProfile();
        </script>
    </body>
</html>
