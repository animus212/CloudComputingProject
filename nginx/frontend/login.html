<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Login</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <nav id="nav"></nav>

        <div class="auth-container">
            <div class="auth-card">
                <h1>Welcome Back</h1>
                <div id="error" class="alert alert-error hidden"></div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password"
                        onkeydown="if(event.key==='Enter') doLogin()">
                </div>
                <button class="btn-primary btn-full" id="loginBtn" data-label="Login" onclick="doLogin()">
                    Login
                </button>

                <p class="auth-link">No account? <a href="/register.html">Register here</a></p>
            </div>
        </div>

        <script src="app.js"></script>
        <script>
            buildNav();
            if (Auth.isLoggedIn()) window.location.href = '/';

            async function doLogin() {
                hideError('error');
                setLoading('loginBtn', true);

                try {
                    const data = await api('/api/auth/login', 'POST', {
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    });
                    Auth.setToken(data.token);
                    Auth.setUser(data.user);

                    if (data.user.role === 'ORGANIZER') window.location.href = '/organizer.html';
                    else window.location.href = '/dashboard.html';
                } catch (err) {
                    showError('error', err.message);
                    setLoading('loginBtn', false);
                }
            }
        </script>
    </body>
</html>
