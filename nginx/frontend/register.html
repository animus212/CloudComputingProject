<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Register</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <nav id="nav"></nav>

        <div class="auth-container">
            <div class="auth-card">
                <h1>Create Account</h1>
                <div id="error" class="alert alert-error hidden"></div>
                <div id="success" class="alert alert-success hidden"></div>

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="At least 8 characters">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="firstName" placeholder="First name">
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="lastName" placeholder="Last name">
                    </div>
                </div>
                <div class="form-group">
                    <label for="role">I want to...</label>
                    <select id="role" required>
                        <option value="USER">Attend Events (User)</option>
                        <option value="ORGANIZER">Host Events (Organizer)</option>
                    </select>
                </div>
                <button class="btn-primary btn-full" id="regBtn" data-label="Create Account" onclick="doRegister()">
                    Create Account
                </button>

                <p class="auth-link">Already have an account? <a href="/login.html">Login</a></p>
            </div>
        </div>

        <script src="app.js"></script>
        <script>
            buildNav();

            async function doRegister() {
                hideError('error');
                setLoading('regBtn', true);

                try {
                    const data = await api('/api/auth/register', 'POST', {
                        username: document.getElementById('username').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                        firstName: document.getElementById('firstName').value,
                        lastName: document.getElementById('lastName').value,
                        role: document.getElementById('role').value
                    });
                    Auth.setToken(data.token);
                    Auth.setUser(data.user);
                    if (data.user.role === 'ORGANIZER') window.location.href = '/organizer.html';
                    else window.location.href = '/dashboard.html';
                } catch (err) {
                    showError('error', err.message);
                    setLoading('regBtn', false);
                }
            }
        </script>
    </body>
</html>
