upstream user_service { server user-service-test:8081; }
upstream event_service { server event-service-test:8082; }
upstream registration_service { server registration-service-test:8083; }
upstream notification_service { server notification-service-test:8084; }

server {
    listen 80;

    location /api/auth/         { proxy_pass http://user_service; }
    location /api/users/        { proxy_pass http://user_service; }
    location /api/events/       { proxy_pass http://event_service; }
    location /api/registrations/ { proxy_pass http://registration_service; }
    location /api/notifications/ { proxy_pass http://notification_service; }

    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
    location / { return 404; }
}