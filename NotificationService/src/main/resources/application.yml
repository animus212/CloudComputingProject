spring:
  application:
    name: notification-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${SERVER_PORT:8084}

jwt:
  secret: ${JWT_SECRET}

services:
  registration-service:
    base-url: ${REGISTRATION_SERVICE_URL:http://registration-service:8083}

logging:
  level:
    com.eventmgmt: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always