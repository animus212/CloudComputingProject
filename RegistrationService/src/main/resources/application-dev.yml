spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:registration_db_dev}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

services:
  event-service:
    base-url: ${EVENT_SERVICE_URL:http://localhost:8082}

logging:
  level:
    com.eventmgmt: DEBUG