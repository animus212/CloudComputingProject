apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s
      external_labels:
        cluster: event-management

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: [localhost:9090]

      - job_name: user-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: [user-service.event-management.svc.cluster.local:8081]
            labels:
              service: user-service

      - job_name: event-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: [event-service.event-management.svc.cluster.local:8082]
            labels:
              service: event-service

      - job_name: registration-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: [registration-service.event-management.svc.cluster.local:8083]
            labels:
              service: registration-service

      - job_name: notification-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: [notification-service.event-management.svc.cluster.local:8084]
            labels:
              service: notification-service

      - job_name: rabbitmq
        metrics_path: /metrics
        static_configs:
          - targets: [rabbitmq.event-management.svc.cluster.local:15692]
            labels:
              service: rabbitmq