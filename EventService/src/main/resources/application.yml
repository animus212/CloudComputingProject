spring:
  application:
    name: event-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

server:
  port: ${SERVER_PORT:8082}

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    com.eventmgmt: INFO